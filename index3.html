<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Завдання 3</title>

<style>
body {
    text-align: center;
    margin-top: 100px;
    font-family: Arial;
}

.title {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
}

/* Лінія зліва */
.title::before {
    content: "";
    flex: 1;
    height: 4px;
    background: black;
    margin-right: 10px;
}

/* Лінія справа */
.title::after {
    content: "";
    flex: 1;
    height: 4px;
    background: black;
    margin-left: 10px;
}
</style>

</head>
<body>



<div class="title">TITLE</div>

</body>
</html>
