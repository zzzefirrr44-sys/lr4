<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Завдання 4</title>

<style>
body {
    background: #ddd;
    font-family: Arial;
    text-align: center;
    padding-top: 50px;
}

/* контейнер */
.wrapper {
    display: inline-block;
    padding: 20px;
    background: #eee;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

/* один блок = одна "батарейка" */
.battery {
    position: relative;
    width: 200px;
    height: 50px;
    border: 5px solid black;
    margin: 20px auto;
}

/* "контакт" справа */
.battery::after {
    content: "";
    position: absolute;
    right: -15px;
    top: 15px;
    width: 10px;
    height: 20px;
    background: black;
}

/* заповнення */
.battery::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
}

/* різні рівні */
.red::before {
    width: 30%;
    background: red;
}

.yellow::before {
    width: 60%;
    background: #f4c20d;
}

.green::before {
    width: 100%;
    background: #0f9d58;
}
</style>

</head>
<body>


<div class="wrapper">
    <div class="battery red"></div>
    <div class="battery yellow"></div>
    <div class="battery green"></div>
</div>

</body>
</html>
